<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 职业性格测试</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
}
.app-container { max-width:680px; margin:0 auto; padding:20px; padding-bottom:60px; }

/* 欢迎页 */
.welcome-screen {
  text-align:center; color:#fff; padding:60px 30px;
  background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px);
  margin-top:40px;
}
.welcome-screen h1 { font-size:2.2em; margin-bottom:15px; }
.welcome-screen p { font-size:1em; opacity:0.9; line-height:1.8; margin-bottom:12px; text-align:left; }
.welcome-btn {
  display:inline-block; padding:14px 50px; font-size:1.2em;
  background:#fff; color:#764ba2; border:none; border-radius:50px;
  cursor:pointer; font-weight:bold; margin-top:25px;
  transition:transform .2s, box-shadow .2s;
}
.welcome-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,0,0,.2); }

/* 进度条 */
.progress-bar {
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,0.95); border-radius:12px; padding:14px 20px;
  margin-bottom:18px; box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.progress-track {
  height:10px; background:#e9ecef; border-radius:5px; overflow:hidden;
}
.progress-fill {
  height:100%; background:linear-gradient(90deg,#667eea,#764ba2);
  border-radius:5px; transition:width .3s ease;
}
.progress-text { font-size:.85em; color:#555; margin-bottom:8px; font-weight:600; }

/* 题目卡片 */
.q-card {
  background:#fff; border-radius:16px; padding:28px 24px; margin-bottom:18px;
  box-shadow:0 4px 15px rgba(0,0,0,.07); transition:transform .2s;
}
.q-card:hover { transform:translateY(-2px); }
.q-num {
  display:inline-block; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff;
  font-size:.78em; padding:4px 12px; border-radius:20px; font-weight:bold; margin-bottom:14px;
}
.q-text { font-size:1.06em; color:#333; line-height:1.7; margin-bottom:20px; font-weight:500; }

/* 选项 */
.option { margin-bottom:16px; }
.option-label {
  display:flex; align-items:center; justify-content:space-between;
  font-size:.95em; color:#444; padding:14px 16px; border:2px solid #e9ecef;
  border-radius:12px; cursor:pointer; transition:all .2s; line-height:1.5;
}
.option-label:hover { border-color:#b8b8e0; background:#fafaff; }
.option-label.selected { border-color:#764ba2; background:#f5f0ff; }
.opt-key { font-weight:bold; color:#764ba2; margin-right:10px; flex-shrink:0; }
.opt-text { flex:1; }

/* 滑块 */
.slider-wrap { padding:8px 4px 0; }
.slider {
  -webkit-appearance:none; appearance:none; width:100%; height:8px;
  border-radius:4px; background:#ddd; outline:none; transition:background .2s;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none; width:26px; height:26px;
  border-radius:50%; background:linear-gradient(135deg,#667eea,#764ba2);
  cursor:pointer; box-shadow:0 2px 6px rgba(118,75,162,.4); border:none;
}
.score-display { text-align:center; font-size:1.5em; font-weight:bold; color:#764ba2; margin-top:4px; }
.score-hint { text-align:center; font-size:.78em; color:#999; margin-top:2px; }

/* 按钮 */
.btn-row { display:flex; gap:12px; justify-content:center; margin-top:20px; margin-bottom:30px; }
.btn {
  padding:12px 36px; border:none; border-radius:50px; font-size:1em;
  cursor:pointer; font-weight:bold; transition:all .2s;
}
.btn-primary { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
.btn-primary:hover { box-shadow:0 6px 20px rgba(102,126,234,.4); transform:translateY(-1px); }
.btn-secondary { background:#e9ecef; color:#555; }
.btn-secondary:hover { background:#dee2e6; }
.btn:disabled { opacity:.4; cursor:not-allowed; transform:none !important; }

/* 结果页 */
.result-screen {
  background:#fff; border-radius:20px; padding:40px 28px; text-align:center;
  margin-top:20px; box-shadow:0 8px 30px rgba(0,0,0,.1);
}
.result-type {
  font-size:3.5em; font-weight:900; background:linear-gradient(135deg,#667eea,#764ba2);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; margin:10px 0;
}
.result-label { font-size:1.1em; color:#888; margin-bottom:25px; }
.dimension-bar { margin:12px 0; }
.dim-row {
  display:flex; align-items:center; margin:8px 0; gap:12px;
}
.dim-name { width:48px; font-weight:bold; font-size:1.1em; text-align:center; }
.dim-bar-wrap { flex:1; display:flex; align-items:center; height:38px; border-radius:8px; overflow:hidden; background:#eee; position:relative;}
.dim-bar-left { height:100%; background:#667eea; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; transition:width .5s; }
.dim-bar-right { height:100%; background:#764ba2; display:flex; align-items:center; padding-left:8px; transition:width .5s; }
.bar-score { color:#fff; font-weight:bold; font-size:.88em; z-index:2; }
.dim-winner { width:36px; font-size:.82em; font-weight:bold; text-align:center; color:#555; }
.result-desc { text-align:left; background:#f8f7fc; border-radius:14px; padding:22px; margin-top:25px; line-height:1.9; color:#444; font-size:.96em; }
.result-desc h3 { color:#764ba2; margin-bottom:12px; font-size:1.15em; }
.restart-btn {
  display:inline-block; margin-top:25px; padding:14px 45px; font-size:1.1em;
  background:linear-gradient(135deg,#667eea,#764ba2); color:#fff;
  border:none; border-radius:50px; cursor:pointer; font-weight:bold;
  transition:transform .2s, box-shadow .2s;
}
.restart-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,0,0,.2); }

/* 性格形象图片 */
.type-avatar {
  width: 180px;
  height: 180px;
  margin: 0 auto 20px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 25px rgba(0,0,0,.15);
  background: #f0f0f0;
}
.type-avatar img {
  width: 500%;
  height: 400%;
  object-fit: cover;
}

.hidden { display:none !important; }
.fade-in { animation:fadeIn .4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(15px);} to{opacity:1;transform:translateY(0);} }

@media(max-width:500px){
  .app-container{padding:12px;padding-bottom:40px;}
  .q-card{padding:20px 16px;}
  .welcome-screen{padding:40px 20px;margin-top:20px;}
  .result-type{font-size:2.8em;}
}
</style>
</head>
<body>
<div class="app-container">

<!-- 欢迎页 -->
<div id="welcomeScreen" class="welcome-screen">
  <h1>🧠 MBTI 职业性格测试</h1>
  <p>📋 本测试基于国际最流行的MBTI人格理论，包含 <strong>48道精心设计的题目</strong>，帮你深入了解自己的性格类型。</p>
  <p>🎯 四个维度：外向/内向(E-I)、感觉/直觉(S-N)、思考/情感(T-F)、判断/知觉(J-P)</p>
  <p>⏱️ 预计用时：<strong>8~12分钟</strong></p>
  <p style="font-size:0.92em;color:#ffd;">💡 答题规则：每题A/B两个选项，分别打分（0~5分），两选项分数之和为5分。越符合你的情况，分数越高。</p>
  <button class="welcome-btn" onclick="startTest()">🚀 开始测试</button>
</div>

<!-- 测试区 -->
<div id="testArea" class="hidden">
  <div class="progress-bar">
    <div class="progress-text">进度：<span id="progressText">1</span> / 48 题</div>
    <div class="progress-track"><div id="progressFill" class="progress-fill" style="width:2%"></div></div>
  </div>
  <div id="questionContainer"></div>
  <div class="btn-row">
    <button id="btnPrev" class="btn btn-secondary" onclick="prevQ()" disabled>⬅️ 上一题</button>
    <button id="btnNext" class="btn btn-primary" onclick="nextQ()">下一题 ➡️</button>
  </div>
</div>

<!-- 结果页 -->
<div id="resultArea" class="hidden"><div id="resultContent" class="result-screen"></div></div>

</div>

<script>
// ====== 题库数据 ======
const questions = [
  // 维度循环: E-I, S-N, T-F, J-P（每4题一循环）
  // A选项对应: E/S/T/J，B选项对应: I/N/F/P

  { q:"当你遇到新朋友时，你",

  { q:"你倾向",
    a:"即使已出计划，也喜欢探讨其它新的方案", b:"一旦定出计划，便希望能依计行事" },

  { q:"下列哪个说法最能贴切形容你对自己的看法？",

  { q:"你认为自己比较",

  { q:"你觉得自己是",
    a:"坦率的人", b:"深沉的人" },
  { q:"你更注重",
    a:"留意事实", b:"注重事实背后的意义" },  // 原文"注重事实"应为笔误

  { q:"面对转变时，你",

  { q:"你觉得自己",

  { q:"你更偏向",

  { q:"你喜欢",
    a:"询问实情", b:"探索感受" },
  { q:"面对意见时，你",

  { q:"你觉得自己是",

  { q:"你偏向",
    a:"实事求是", b:"具远大目光" },
  { q:"你认为自己在处理问题时更",

    a:"在自己有兴趣的范畴积累丰富的经验", b:"有各式各样不同的经验" },
  { q:"哪一句较能表达你的看法？",

// 0:E-I, 1:S-N, 2:T-F, 3:J-P
function getDim(idx) { return idx % 4; }
const dimNames = [ ['E','I'], ['S','N'], ['T','F'], ['J','P'] ];
const dimLabels = [
  '外向 (Extraversion) — 内向 (Introversion)',
  '感觉 (Sensing) — 直觉 (Intuition)',
  '思考 (Thinking) — 情感 (Feeling)',
  '判断 (Judging) — 知觉 (Perceiving)'
];

// ====== 16种人格详细描述 ======
const typeInfo = {
  ISTJ: {
    title:'检查员 / 可靠的务实者',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#2C3E50"/><rect x="55" y="75" width="90" height="70" rx="8" fill="#ECF0F1"/><rect x="65" y="82" width="70" height="10" rx="2" fill="#3498DB"/><rect x="65" y="97" width="50" height="6" rx="2" fill="#BDC3C7"/><rect x="65" y="108" width="60" height="6" rx="2" fill="#BDC3C7"/><rect x="65" y="119" width="40" height="6" rx="2" fill="#BDC3C7"/><circle cx="115" cy="130" r="12" fill="#27AE60"/><path d="M110 128 L114 132 L121 123" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="100" cy="48" r="22" fill="#FDBF60"/><circle cx="93" cy="44" r="3" fill="#2C3E50"/><circle cx="107" cy="44" r="3" fill="#2C3E50"/><path d="M93 54 Q100 58 107 54" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/><rect x="85" y="38" width="30" height="4" rx="2" fill="#2C3E50"/><text x="100" y="178" text-anchor="middle" fill="#ECF0F1" font-size="14" font-weight="bold">ISTJ</text></svg>`,
    color:'#2C3E50',
    desc:`<strong>ISTJ — 内向·感觉·思考·判断</strong><br><br>

    💼 <strong>职业优势：</strong>十分留意细节，在工作、居家和生活中都有良好的组织性和秩序感。照既定成效决策，不畏阻挠与闲言，坚定执行。重视传统与忠诚。<br><br>
    🔧 <strong>适合方向：</strong>会计、审计、行政管理、律师、工程师、军官、项目经理等需要精确和责任感的岗位。<br><br>

  },
  ISFJ: {

    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#E74C3C"/><path d="M100 35 L108 55 L130 58 L113 73 L118 95 L100 83 L82 95 L87 73 L70 58 L92 55 Z" fill="#F1C40F"/><circle cx="100" cy="120" r="30" fill="#FAD7A0"/><circle cx="90" cy="115" r="3" fill="#2C3E50"/><circle cx="110" cy="115" r="3" fill="#2C3E50"/><path d="M93 126 Q100 132 107 126" stroke="#E74C3C" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M80 145 Q100 165 120 145" stroke="#FAD7A0" stroke-width="8" fill="none" stroke-linecap="round"/><text x="100" y="178" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">ISFJ</text></svg>`,
    color:'#E74C3C',
    desc:`<strong>ISFJ — 内向·感觉·情感·判断</strong><br><br>
    🎯 <strong>核心特征：</strong>安静、和善、负责任且有良心。行事尽责投入，安定性高，常居项目或团体中的安定力量。<br><br>

  INFJ: {
    title:'咨询师 / 理想的引路人',

    color:'#764ba2',
    desc:`<strong>INFJ — 内向·直觉·情感·判断</strong><br><br>
    🎯 <strong>核心特征：</strong>因为坚忍、创意及必须达成的意图而能成功。会在工作中投注最大努力。默默但强有力地、诚挚地用心关切他人。<br><br>
    💼 <strong>职业优势：</strong>因坚守原则而受敬重。提出造福大众利益的明确远景而受人尊敬与追随。追求创见、关系及物质财物的意义和关联。<br><br>
    🔧 <strong>适合方向：</strong>心理咨询师、作家、培训师、非营利组织工作、人力资源发展、艺术设计等富有意义的领域。<br><br>
    ⭐ <strong>关键词：</strong>理想 | 洞察 | 坚守 | 启发`
  },
  INTJ: {
    title:'策划师 / 独立的战略家',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#1A1A2E"/><polygon points="100,40 130,75 115,75 115,110 85,110 85,75 70,75" fill="#E94560"/><circle cx="100" cy="135" r="20" fill="#FAD7A0"/><rect x="92" y="127" width="6" height="4" rx="1" fill="#16213E"/><rect x="102" y="127" width="6" height="4" rx="1" fill="#16213E"/><path d="M96 138 Q100 142 104 138" stroke="#C0392B" stroke-width="1.8" fill="none" stroke-linecap="round"/><rect x="60" y="55" width="18" height="25" rx="3" fill="#0F3460" opacity="0.7"/><rect x="122" y="55" width="18" height="25" rx="3" fill="#0F3460" opacity="0.7"/><circle cx="150" cy="45" r="4" fill="#E94560" opacity="0.5"/><circle cx="50" cy="155" r="3" fill="#FFF" opacity="0.3"/><text x="100" y="178" text-anchor="middle" fill="#E94560" font-size="14" font-weight="bold">INTJ</text></svg>`,
    color:'#1A1A2E',
    desc:`<strong>INTJ — 内向·直觉·思考·判断</strong><br><br>
    🎯 <strong>核心特征：</strong>具强大动力与本意来达成目的与创意——可以说是"固执的顽固者"。有宏大愿景且能快速从众多外界事件中找出有意义的模式。<br><br>
    💼 <strong>职业优势：</strong>对所承负职务具良好能力于策划工作并完成。具怀疑心、挑剔性、独立性、果决，对专业水准及绩效要求高。<br><br>
    🔧 <strong>适合方向：</strong>科学家、软件架构师、战略顾问、投资分析师、律师、大学教授等需要深度思考和长远规划的工作。<br><br>
    ⭐ <strong>关键词：</strong>战略 | 独立 | 果断 | 远见`
  },
  ISTP: {
    title:'鉴赏家 / 冷静的分析师',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#1ABC9C"/><rect x="65" y="60" width="70" height="50" rx="6" fill="#ECF0F1"/><circle cx="100" cy="85" r="15" fill="#34495E"/><polygon points="100,75 103,82 110,82 105,87 107,94 100,90 93,94 95,87 90,82 97,82" fill="#F1C40F"/><rect x="72" y="105" width="56" height="3" rx="1" fill="#BDC3C7"/><rect x="80" y="115" width="40" height="35" rx="5" fill="#E67E22"/><circle cx="92" cy="130" r="5" fill="#FFF"/><circle cx="108" cy="130" r="5" fill="#FFF"/><path d="M88 140 Q100 148 112 140" stroke="#FFF" stroke-width="2" fill="none" stroke-linecap="round"/><text x="100" y="175" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">ISTP</text></svg>`,
    color:'#1ABC9C',
    desc:`<strong>ISTP — 内向·感觉·思考·知觉</strong><br><br>
    🎯 <strong>核心特征：</strong>冷静旁观者——安静、预留余地、弹性，以无偏见的好奇心观察与分析。具备未预期原始的幽默感。<br><br>
    💼 <strong>职业优势：</strong>有兴趣于探索原因及效果。技术事件为何及如何运作，使用逻辑原理组构事实、重视效能。擅长掌握问题核心及找出解决方式。<br><br>
    🔧 <strong>适合方向：</strong>工程师、技术人员、软件开发者、机械师、飞行员、运动员等实操型和技术型工作。<br><br>
    ⭐ <strong>关键词：</strong>冷静 | 分析 | 灵活 | 务实`
  },
  ISFP: {
    title:'艺术家 / 敏感的自由灵魂',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#F39C12"/><ellipse cx="100" cy="90" rx="35" ry="38" fill="#FAD7A0"/><circle cx="88" cy="85" r="4" fill="#2C3E50"/><circle cx="112" cy="85" r="4" fill="#2C3E50"/><path d="M92 98 Q100 105 108 98" stroke="#E74C3C" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M70 75 Q78 55 92 65 M108 65 Q122 55 130 75" stroke="#8E44AD" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/><ellipse cx="80" cy="140" rx="12" ry="18" fill="#E67E22"/><ellipse cx="120" cy="140" rx="12" ry="18" fill="#E67E22"/><circle cx="150" cy="60" r="6" fill="#E74C3C" opacity="0.4"/><text x="100" y="178" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">ISFP</text></svg>`,
    color:'#F39C12',
    desc:`<strong>ISFP — 内向·感觉·情感·知觉</strong><br><br>
    🎯 <strong>核心特征：</strong>羞怯的、安宁和善、敏感、亲切，且行事谦虚。喜于避开争论，不对他人强加己见或价值观。<br><br>
    💼 <strong>职业优势：</strong>无意于领导却常是忠诚的追随者。办事不急躁，安于现状，非成果导向。喜欢自有空间及按自订时程办事。<br><br>
    🔧 <strong>适合方向：</strong>艺术家、设计师、厨师、兽医、心理咨询师、社工、摄影师等富有美感和人文关怀的领域。<br><br>
    ⭐ <strong>关键词：</strong>温和 | 艺术 | 自由 | 灵性`
  },
  INFP: {
    title:'治愈者 / 理想的梦想家',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#9B59B6"/><path d="M100 50 C70 50,55 80,55 110 C55 145,75 165,100 165 C125 165,145 145,145 110 C145 80,130 50,100 50Z" fill="#FAD7A0"/><ellipse cx="87" cy="100" r="5" fill="#2C3E50"/><ellipse cx="113" cy="100" r="5" fill="#2C3E50"/><path d="M92 115 Q100 123 108 115" stroke="#8E44AD" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M75 85 Q82 78 90 84 M110 84 Q118 78 125 85" stroke="#F39C12" stroke-width="4" fill="none" stroke-linecap="round"/><circle cx="65" cy="130" r="12" fill="#3498DB" opacity="0.5"/><path d="M60 128 L63 133 L58 134 M140 75 L143 70 L146 76" stroke="#F1C40F" stroke-width="2" opacity="0.7"/><text x="100" y="178" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">INFP</text></svg>`,
    color:'#9B59B6',
    desc:`<strong>INFP — 内向·直觉·情感·知觉</strong><br><br>
    🎯 <strong>核心特征：</strong>安静观察者，具理想性，对其价值观及重要之人具忠诚心。希外在生活形态与内在价值观相吻合。<br><br>
    💼 <strong>职业优势：</strong>具好奇心且很快能看出机会所在。常担负开发创意的触媒者。除非价值观受侵犯，行事会具弹性、适应力高且承受力强。具想了解及发展他人潜能的企图。<br><br>
    🔧 <strong>适合方向：</strong>作家、心理学家、艺术家、音乐家、社会工作者、宗教/精神工作者等追求理想价值的领域。<br><br>
    ⭐ <strong>关键词：</strong>理想 | 忠诚 | 创意 | 共情`
  },
  INTP: {
    title:'思想家 / 逻辑的探索者',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#5D6D7E"/><path d="M100 52 C72 52,58 80,58 108 C58 142,76 162,100 162 C124 162,142 142,142 108 C142 80,128 52,100 52Z" fill="#F5CBA7"/><ellipse cx="88" cy="98" r="4" fill="#2C3E50"/><ellipse cx="112" cy="98" r="4" fill="#2C3E50"/><path d="M93 112 Q100 118 107 112" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M78 82 Q85 75 93 81 M107 81 Q115 75 122 82" stroke="#5D6D7E" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="140" cy="60" r="15" fill="#F1C40F" opacity="0.3"/><path d="M50 140 L60 140 L55 130 M150 140 L160 140 L155 130" stroke="#E74C3C" stroke-width="3" opacity="0.5"/><text x="100" y="178" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">INTP</text></svg>`,
    color:'#5D6D7E',
    desc:`<strong>INTP — 内向·直觉·思考·知觉</strong><br><br>
    🎯 <strong>核心特征：</strong>安静、自持、弹性及具适应力。特别喜爱追求理论与科学事理。习于以逻辑及分析来解决问题——天生的"问题解决者"。<br><br>
    💼 <strong>职业优势：</strong>最有兴趣于创意事务及特定工作，对聚会与闲聊无大兴趣。追求可发挥个人强烈兴趣的生涯。追求发展对有兴趣事务之逻辑解释。<br><br>
    🔧 <strong>适合方向：</strong>科学家、数学家、软件工程师、哲学家、研究员、系统分析师等需要深度逻辑分析的领域。<br><br>
    ⭐ <strong>关键词：</strong>逻辑 | 好奇 | 分析 | 独立`
  },
  ESTP: {
    title: '企业家 / 行动的冒险家',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#E67E22"/><path d="M100 48 C70 48,55 78,55 110 C55 146,75 166,100 166 C125 166,145 146,145 110 C145 78,130 48,100 48Z" fill="#F5CBA7"/><ellipse cx="87" cy="100" r="5" fill="#2C3E50"/><ellipse cx="113" cy="100" r="5" fill="#2C3E50"/><path d="M90 118 Q100 128 110 118" stroke="#E67E22" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M72 82 Q80 75 90 82 M110 82 Q120 75 128 82" stroke="#D35400" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M45 100 L55 100 M145 100 L155 100" stroke="#F1C40F" stroke-width="4" opacity="0.6"/><circle cx="100" cy="45" r="10" fill="#F1C40F" opacity="0.5"/><text x="100" y="178" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">ESTP</text></svg>`,
    color:'#E67E22',
    desc:`<strong>ESTP — 外向·感觉·思考·知觉</strong><br><br>
    🎯 <strong>核心特征：</strong>擅长现场实时解决问题——天生的"问题解决者"。喜欢办事并乐于其中及过程。倾向于喜好技术事务及运动。<br><br>
    💼 <strong>职业优势：</strong>具适应性、容忍度、务实性；投注心力于很快具成效工作。不喜欢冗长概念的解释及理论。最专精于可操作、处理、分解或组合的真实事务。<br><br>
    🔧 <strong>适合方向：</strong>销售、企业家、教练、警察、消防员、股票交易员、活动策划等快节奏实践型工作。<br><br>
    ⭐ <strong>关键词：</strong>行动 | 灵活 | 务实 | 冒险`
  },
  ESFP: {
    title:'表演者 / 热情的娱乐家',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#FF69B4"/><path d="M100 48 C70 48,55 78,55 110 C55 146,75 166,100 166 C125 166,145 146,145 110 C145 78,130 48,100 48Z" fill="#F5CBA7"/><ellipse cx="87" cy="100" r="5" fill="#2C3E50"/><ellipse cx="113" cy="100" r="5" fill="#2C3E50"/><path d="M88 118 Q100 130 112 118" stroke="#FF1493" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M72 82 Q80 75 90 82 M110 82 Q120 75 128 82" stroke="#C71585" stroke-width="4" fill="none" stroke-linecap="round"/><circle cx="50" cy="50" r="12" fill="#FFD700" opacity="0.5"/><circle cx="150" cy="150" r="12" fill="#FF6347" opacity="0.5"/><path d="M45 140 Q55 130 65 140" stroke="#FFF" stroke-width="3" opacity="0.7"/><text x="100" y="178" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">ESFP</text></svg>`,
    color:'#FF69B4',
    desc:`<strong>ESFP — 外向·感觉·情感·知觉</strong><br><br>
    🎯 <strong>核心特征：</strong>外向、和善、接受性、乐于分享喜乐予他人。喜欢与他人一起行动且促成事件发生。<br><br>
    💼 <strong>职业优势：</strong>知晓事件未来的发展并会热烈参与。最擅长人际相处能力及完备常识，很有弹性能立即适应他人与环境。对生命、人、物质享受的热爱者。<br><br>
    🔧 <strong>适合方向：</strong>演员、销售、旅游导游、教师、公关、活动主持、儿童教育等与人互动频繁的领域。<br><br>
    ⭐ <strong>关键词：</strong>热情 | 乐天 | 社交 | 自由`
  },
  ENFP: {
    title: '竞选者 / 充满灵感的梦想家',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#FF8C00"/><path d="M100 48 C70 48,55 78,55 110 C55 146,75 166,100 166 C125 166,145 146,145 110 C145 78,130 48,100 48Z" fill="#F5CBA7"/><ellipse cx="87" cy="100" r="5" fill="#2C3E50"/><ellipse cx="113" cy="100" r="5" fill="#2C3E50"/><path d="M88 118 Q100 130 112 118" stroke="#FF8C00" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M72 82 Q80 75 90 82 M110 82 Q120 75 128 82" stroke="#FF6347" stroke-width="4" fill="none" stroke-linecap="round"/><circle cx="50" cy="60" r="10" fill="#FFD700" opacity="0.6"/><circle cx="150" cy="60" r="10" fill="#FF69B4" opacity="0.6"/><path d="M40 130 L50 120 L60 130" stroke="#FFF" stroke-width="2" opacity="0.7"/><path d="M140 130 L150 120 L160 130" stroke="#FFF" stroke-width="2" opacity="0.7"/><text x="100" y="178" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">ENFP</text></svg>`,
    color:'#FF8C00',
    desc:`<strong>ENFP — 外向·直觉·情感·知觉</strong><br><br>
    🎯 <strong>核心特征：</strong>充满热忱、活力充沛、聪明、富想象力，视生命充满机会但期能得自他人肯定与支持。几乎能达成所有有兴趣的事。<br><br>
    💼 <strong>职业优势：</strong>对难题很快就有对策并能对有困难的人施予援手。依赖能改善的能力而无须预作规划准备。为达目的常能找出强制自己为之的理由——即兴执行者。<br><br>
    🔧 <strong>适合方向：</strong>记者、广告创意、心理咨询师、演员、创业者、市场营销、培训师等富有创造力和人际连接的工作。<br><br>
    ⭐ <strong>关键词：</strong>热情 | 创意 | 灵感 | 可能性`
  },
  ENTP: {
    title:'辩论家 / 机智的挑战者',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#9B59B6"/><path d="M100 48 C70 48,55 78,55 110 C55 146,75 166,100 166 C125 166,145 146,145 110 C145 78,130 48,100 48Z" fill="#F5CBA7"/><ellipse cx="87" cy="100" r="5" fill="#2C3E50"/><ellipse cx="113" cy="100" r="5" fill="#2C3E50"/><path d="M88 118 Q100 128 112 118" stroke="#9B59B6" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M72 82 Q80 75 90 82 M110 82 Q120 75 128 82" stroke="#8E44AD" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M45 90 L55 100 L45 110" stroke="#FFD700" stroke-width="3" opacity="0.7"/><path d="M155 90 L145 100 L155 110" stroke="#FFD700" stroke-width="3" opacity="0.7"/><circle cx="100" cy="35" r="8" fill="#E74C3C" opacity="0.5"/><text x="100" y="178" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">ENTP</text></svg>`,
    color:'#9B59B6',
    desc:`<strong>ENTP — 外向·直觉·思考·知觉</strong><br><br>
    🎯 <strong>核心特征：</strong>反应快、聪明、长于多样事务。具激励伙伴、敏捷及直言讳之专长。会为了有趣对问题的两面加以争辩。<br><br>
    💼 <strong>职业优势：</strong>对解决新及挑战性的问题富有策略，但会轻忽或厌烦经常的任务与细节。兴趣多元，易倾向于转移至新生的兴趣。长于看清础他人，有智能去解决新或有挑战的问题。<br><br>
    🔧 <strong>适合方向：</strong>创业家、律师、咨询顾问、科学家、编剧、投资人、产品经理等需要创新和策略思维的领域。<br><br>
    ⭐ <strong>关键词：</strong>机智 | 创新 | 辩论 | 策略`
  },
  ESTJ: {
    title:'执行官 / 高效的管理者',
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="#2980B9"/><path d="M100 48 C70 48,55 78,55 110 C55 146,75 166,100 166 C125 166,145 146,145 110 C145 78,130 48,100 48Z" fill="#F5CBA7"/><ellipse cx="87" cy="100" r="5" fill="#2C3E50"/><ellipse cx="113" cy="100" r="5" fill="#2C3E50"/><path d="M92 118 Q100 124 108 118" stroke="#2980B9" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M72 82 Q80 75 90 82 M110 82 Q120 75 128 82" stroke="#1A5276" stroke-width="4" fill="none" stroke-linecap="round"/><rect x="45" y="55" width="20" height="15" fill="#F1C40F" opacity="0.6" rx="2"/><rect x="135" y="55" width="20" height="15" fill="#F1C40F" opacity="0.6" rx="2"/><path d="M50 140 L60 130 L70 140" stroke="#E74C3C" stroke-width="3" opacity="0.6"/><text x="100" y="178" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">ESTJ</text></svg>`,
    color:'#2980B9',
    desc:`<strong>ESTJ — 外向·感觉·思考·判断</strong><br><br>

// ====== 全局状态 ======
let currentQ = 0;
let scores = [];  // 每个元素 {a:n, b:n}, a+b=5

// ====== 初始化 ======
function init() {
  scores = questions.map(() => ({ a: 2, b: 3 })); // 默认值
}

function startTest() {
  init();
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('testArea').classList.remove('hidden');
  document.getElementById('testArea').classList.add('fade-in');
  renderQuestion();
}

// ====== 渲染题目 ======
function renderQuestion() {
  const q = questions[currentQ];
  const dim = getDim(currentQ);
  const dnames = dimNames[dim];
  const container = document.getElementById('questionContainer');

  container.innerHTML = `
    <div class="q-card fade-in">
      <span class="q-num">第 ${currentQ + 1} 题 · 维度 ${dnames[0]}/${dnames[1]}</span>
      <div class="q-text">${q.q}</div>

      <div class="option">
        <div class="option-label ${scores[currentQ].a > scores[currentQ].b ? 'selected' : ''}" id="optA">
          <span class="opt-text"><span class="opt-key">A.</span>${q.a}</span>
          <span style="color:#999;font-size:.82em;">${dnames[0]} 倾向</span>
        </div>
        <div class="slider-wrap">
          <input type="range" class="slider" id="scoreSlider" min="0" max="5" value="${scores[currentQ].a}"
            oninput="updateScore(this.value)">
          <div class="score-display"><span id="scoreA">${scores[currentQ].a}</span> : <span id="scoreB">${scores[currentQ].b}</span></div>
          <div class="score-hint">← 向左滑 = 更倾向B &nbsp;&nbsp; 向右滑 = 更倾向A →</div>
        </div>
      </div>

      <div class="option">
        <div class="option-label ${scores[currentQ].b > scores[currentQ].a ? 'selected' : ''}" id="optB">
          <span class="opt-text"><span class="opt-key">B.</span>${q.b}</span>
          <span style="color:#999;font-size:.82em;">${dnames[1]} 倾向</span>
        </div>
      </div>
    </div>`;

  updateProgress();
  updateButtons();
}

function updateScore(val) {
  val = parseInt(val);
  scores[currentQ].a = val;
  scores[currentQ].b = 5 - val;

  document.getElementById('scoreA').textContent = val;
  document.getElementById('scoreB').textContent = 5 - val;

  const optA = document.getElementById('optA');
  const optB = document.getElementById('optB');
  optA.classList.toggle('selected', val > 5 - val);
  optB.classList.toggle('selected', 5 - val > val);
}

function updateProgress() {
  document.getElementById('progressText').textContent = currentQ + 1;
  const pct = ((currentQ + 1) / 48 * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateButtons() {
  document.getElementById('btnPrev').disabled = currentQ === 0;
  const nextBtn = document.getElementById('btnNext');
  if (currentQ === 47) {
    nextBtn.textContent = '✅ 提交答卷';
  } else {
    nextBtn.textContent = '下一题 ➡️';
  }
}

function nextQ() {
  if (currentQ < 47) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

// ====== 计算结果 ======
function showResult() {
  // 初始化四个维度的得分
  const dims = [
    { left: 0, right: 0 },   // E - I
    { left: 0, right: 0 },   // S - N
    { left: 0, right: 0 },   // T - F
    { left: 0, right: 0 }    // J - P
  ];

  for (let i = 0; i < 48; i++) {
    const dim = getDim(i);
    dims[dim].left += scores[i].a;   // A选项 → 左侧(E,S,T,J)
    dims[dim].right += scores[i].b;  // B选项 → 右侧(I,N,F,P)
  }

  // 确定各维度胜出者
  const results = [];
  for (let d = 0; d < 4; d++) {
    const tieBreaker = ['I','N','F','P'][d]; // 同分选后者
    if (dims[d].left > dims[d].right) {
      results.push(dimNames[d][0]);
    } else {
      results.push(dimNames[d][1]); // 同分走这里
    }
  }

  const typeCode = results.join('');
  const info = typeInfo[typeCode];

  // 生成维度条
  let barsHTML = '';
  for (let d = 0; d < 4; d++) {
    const total = dims[d].left + dims[d].right;
    const leftPct = total > 0 ? ((dims[d].left / total) * 100).toFixed(0) : 50;
    const rightPct = total > 0 ? (100 - parseFloat(leftPct)).toFixed(0) : 50;
    const winner = dims[d].left > dims[d].right ? dimNames[d][0] : dimNames[d][1];
    barsHTML += `
      <div class="dimension-bar">
        <div class="dim-label" style="font-size:.88em;color:#666;margin-bottom:3px;">${dimLabels[d]}</div>
        <div class="dim-row">
          <span class="dim-name" style="color:#667eea;">${dimNames[d][0]}</span>
          <div class="dim-bar-wrap">
            <div class="dim-bar-left" style="width:${leftPct}%">
              <span class="bar-score">${dims[d].left}</span>
            </div>
            <div class="dim-bar-right" style="width:${rightPct}%">
              <span class="bar-score">${dims[d].right}</span>
            </div>
          </div>
          <span class="dim-name" style="color:#764ba2;">${dimNames[d][1]}</span>
          <span class="dim-winner">→ ${winner}</span>
        </div>
      </div>`;
  }

  document.getElementById('testArea').classList.add('hidden');
  const resultDiv = document.getElementById('resultContent');
  resultDiv.innerHTML = `
    <div class="fade-in">
      <div class="result-label">✨ 你的MBTI性格类型是</div>
      <div class="type-avatar" style="background:${info.color || '#667eea'};">${info.svg || ''}</div>
      <div class="result-type">${typeCode}</div>
      <div style="font-size:1.15em;color:#764ba2;font-weight:bold;margin-bottom:8px;">${info.title}</div>
      ${barsHTML}
      <div class="result-desc">
        <h3>📖 性格详解</h3>
        ${info.desc}
      </div>
      <button class="restart-btn" onclick="location.reload()">🔄 重新测试</button>
    </div>`;

  document.getElementById('resultArea').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
